<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cullo — Your Gallery</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0e10;
            --surface: #18181b;
            --surface-hover: #222226;
            --border: rgba(255,255,255,0.08);
            --text: #f4f4f5;
            --text-muted: #71717a;
            --accent: #a78bfa;
            --heart: #f43f5e;
            --heart-bg: rgba(244,63,94,0.12);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(14,14,16,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left { flex: 1; }
        .header-left h1 { font-size: 20px; font-weight: 600; }
        .header-left p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

        .hearts-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--heart-bg);
            border: 1px solid rgba(244,63,94,0.25);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--heart);
            transition: transform 0.15s;
        }
        .hearts-counter.bump { transform: scale(1.15); }

        .btn-send {
            background: var(--heart);
            color: white;
            border: none;
            border-radius: 9px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-send:hover { opacity: 0.88; }
        .btn-send:disabled { opacity: 0.4; cursor: default; }

        /* ── Grid ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 3px;
            padding: 16px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            background: var(--surface);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease, filter 0.3s;
        }

        .photo-item:hover img { transform: scale(1.03); }

        .photo-item.hearted img {
            filter: brightness(0.85);
        }

        /* Heart overlay */
        .heart-btn {
            position: absolute;
            top: 10px; right: 10px;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            line-height: 1;
            transition: transform 0.2s, background 0.2s;
            z-index: 5;
            color: white;
        }
        .heart-btn:hover { transform: scale(1.2); background: rgba(0,0,0,0.7); }
        .photo-item.hearted .heart-btn {
            background: var(--heart);
            color: white;
        }
        .heart-btn.pop {
            animation: pop 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
        @keyframes pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.4); }
            80%  { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Title overlay on hover */
        .photo-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
            padding: 24px 12px 12px;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .photo-overlay .ptitle {
            font-size: 13px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .photo-overlay .psummary {
            font-size: 11px;
            color: rgba(255,255,255,0.75);
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox.open { display: flex; }

        .lb-inner {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lb-inner img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lb-close {
            position: absolute;
            top: -40px; right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .lb-close:hover { opacity: 1; }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            font-size: 24px;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.25); }
        .lb-prev { left: -56px; }
        .lb-next { right: -56px; }

        .lb-footer {
            margin-top: 16px;
            text-align: center;
        }
        .lb-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .lb-summary { font-size: 13px; color: var(--text-muted); max-width: 500px; }
        .lb-heart-btn {
            margin-top: 14px;
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 30px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .lb-heart-btn:hover { border-color: var(--heart); color: var(--heart); }
        .lb-heart-btn.active {
            background: var(--heart-bg);
            border-color: var(--heart);
            color: var(--heart);
        }

        /* ── States ── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Sent confirmation ── */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 48px;
            text-align: center;
            max-width: 440px;
        }
        .confirm-box .big-emoji { font-size: 56px; margin-bottom: 16px; }
        .confirm-box h2 { font-size: 22px; margin-bottom: 8px; }
        .confirm-box p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
        .confirm-box .btn-ok {
            margin-top: 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 9px;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>Your Photo Gallery</h1>
        <p>Heart the photos you love — then click "Send My Picks" when you're done.</p>
    </div>
    <div class="hearts-counter" id="hearts-counter">
        <span>♥</span>
        <span id="hearts-count">0</span> selected
    </div>
    <button class="btn-send" id="btn-send" onclick="sendPicks()" disabled>Send My Picks</button>
</div>

<div class="gallery" id="gallery">
    <div class="loading-state" style="grid-column:1/-1">
        <div class="spinner"></div>
        <p>Loading your photos…</p>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
    <div class="lb-inner">
        <button class="lb-close" onclick="closeLb()">×</button>
        <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
        <img id="lb-img" src="" alt="">
        <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
    </div>
    <div class="lb-footer">
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-summary" id="lb-summary"></div>
        <button class="lb-heart-btn" id="lb-heart-btn" onclick="toggleHeart(lbIndex)">
            ♥ Add to Favourites
        </button>
    </div>
</div>

<!-- Sent confirmation -->
<div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
        <div class="big-emoji">🎉</div>
        <h2>Your picks have been sent!</h2>
        <p>Your photographer now knows which photos you love.<br>They'll start editing those for you right away.</p>
        <button class="btn-ok" onclick="document.getElementById('confirm-overlay').classList.remove('open')">Done</button>
    </div>
</div>

<script>
let photos = [];
let lbIndex = 0;

async function load() {
    const res = await fetch('/api/client/photos');
    photos = await res.json();

    const picksRes = await fetch('/api/client/picks');
    const picksData = await picksRes.json();
    const heartedIds = new Set(picksData.ids);

    photos.forEach(p => { p.hearted = heartedIds.has(p.id); });
    updateCounter();
    renderGallery();
}

function renderGallery() {
    const grid = document.getElementById('gallery');
    if (!photos.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h2>No photos yet</h2><p>The photographer will share photos here after your session.</p></div>';
        return;
    }

    grid.innerHTML = photos.map((p, i) => `
        <div class="photo-item ${p.hearted ? 'hearted' : ''}" id="item-${p.id}" onclick="openLb(${i})">
            <img src="/photo/${p.id}" alt="${p.title}" loading="lazy">
            <button class="heart-btn" id="heart-${p.id}" onclick="event.stopPropagation(); toggleHeart(${i})">
                ${p.hearted ? '♥' : '♡'}
            </button>
            <div class="photo-overlay">
                <div class="ptitle">${p.title}</div>
                <div class="psummary">${p.summary}</div>
            </div>
        </div>
    `).join('');
}

async function toggleHeart(index) {
    const p = photos[index];
    const res = await fetch(`/api/client/heart/${p.id}`, { method: 'POST' });
    const data = await res.json();

    p.hearted = data.hearted;

    // Update grid item
    const item = document.getElementById(`item-${p.id}`);
    const btn  = document.getElementById(`heart-${p.id}`);
    if (item) item.classList.toggle('hearted', p.hearted);
    if (btn)  {
        btn.textContent = p.hearted ? '♥' : '♡';
        btn.classList.add('pop');
        setTimeout(() => btn.classList.remove('pop'), 300);
    }

    updateCounter();
    updateLbBtn(index);
}

function updateCounter() {
    const count = photos.filter(p => p.hearted).length;
    document.getElementById('hearts-count').textContent = count;
    document.getElementById('btn-send').disabled = count === 0;

    const counter = document.getElementById('hearts-counter');
    counter.classList.add('bump');
    setTimeout(() => counter.classList.remove('bump'), 200);
}

function updateLbBtn(index) {
    const p = photos[index];
    const btn = document.getElementById('lb-heart-btn');
    if (!btn) return;
    btn.className = 'lb-heart-btn' + (p.hearted ? ' active' : '');
    btn.innerHTML = p.hearted ? '♥ In Your Favourites' : '♡ Add to Favourites';
}

// ── Lightbox ──
function openLb(index) {
    lbIndex = index;
    showLb();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function showLb() {
    const p = photos[lbIndex];
    document.getElementById('lb-img').src = `/photo/${p.id}`;
    document.getElementById('lb-title').textContent = p.title;
    document.getElementById('lb-summary').textContent = p.summary;
    updateLbBtn(lbIndex);
}

function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}

function lbClickOutside(e) {
    if (e.target === document.getElementById('lightbox')) closeLb();
}

function lbNav(dir) {
    lbIndex = (lbIndex + dir + photos.length) % photos.length;
    showLb();
}

document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLb();
    if (e.key === 'ArrowRight')  lbNav(1);
    if (e.key === 'ArrowLeft')   lbNav(-1);
    if (e.key === 'h' || e.key === 'H') toggleHeart(lbIndex);
});

async function sendPicks() {
    const picked = photos.filter(p => p.hearted);
    if (!picked.length) return;
    // Picks are already saved server-side on each heart click.
    // Just show the confirmation.
    document.getElementById('confirm-overlay').classList.add('open');
}

load();
</script>
</body>
</html>
